<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gym Session Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a2e;
    --bg2: #16213e;
    --bg3: #0f3460;
    --card: #1e2a45;
    --border: #2a3a5c;
    --accent: #4361ee;
    --accent-hover: #3451de;
    --success: #06d6a0;
    --warning: #ffd166;
    --danger: #ef476f;
    --text: #e8eaf6;
    --text-muted: #8892b0;
    --radius: 12px;
    --radius-sm: 8px;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    font-size: 16px;
    line-height: 1.5;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── SCREENS ── */
  .screen {
    display: none;
    min-height: 100vh;
    flex-direction: column;
    animation: fadeIn 0.3s ease;
  }
  .screen.active { display: flex; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ── SCREEN 1: LOAD ── */
  #screen-load {
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .load-card {
    width: 100%;
    max-width: 480px;
    background: var(--card);
    border-radius: var(--radius);
    padding: 28px 24px;
    border: 1px solid var(--border);
  }

  .logo {
    text-align: center;
    margin-bottom: 28px;
  }
  .logo-icon {
    font-size: 48px;
    display: block;
    margin-bottom: 8px;
  }
  .logo h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  .logo p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  textarea {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: monospace;
    font-size: 13px;
    padding: 12px;
    resize: vertical;
    min-height: 180px;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea.readonly {
    min-height: 320px;
    background: var(--bg2);
    cursor: default;
    font-size: 12px;
    line-height: 1.6;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 16px 0;
    color: var(--text-muted);
    font-size: 13px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .file-btn {
    width: 100%;
    background: transparent;
    border: 1.5px dashed var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    padding: 14px;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: border-color 0.2s, color 0.2s;
    min-height: 44px;
  }
  .file-btn:hover, .file-btn:active {
    border-color: var(--accent);
    color: var(--accent);
  }

  #file-input { display: none; }

  .error-box {
    background: rgba(239,71,111,0.12);
    border: 1px solid var(--danger);
    border-radius: var(--radius-sm);
    color: var(--danger);
    padding: 12px 14px;
    font-size: 14px;
    margin-top: 12px;
    display: none;
  }
  .error-box.visible { display: block; }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 48px;
    padding: 12px 20px;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s, transform 0.1s, background 0.2s;
    text-align: center;
    width: 100%;
    -webkit-appearance: none;
  }
  .btn:active { transform: scale(0.97); opacity: 0.9; }

  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary { background: var(--bg3); color: var(--text); }
  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    border: 1.5px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-success { background: var(--success); color: #000; }
  .btn-danger { background: var(--danger); color: #fff; }

  .btn-sm {
    min-height: 44px;
    font-size: 14px;
    padding: 10px 16px;
  }

  .mt-12 { margin-top: 12px; }
  .mt-16 { margin-top: 16px; }
  .mt-20 { margin-top: 20px; }

  /* ── SCREEN 2: SESSION ── */
  #screen-session {
    flex-direction: column;
  }

  .session-header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .session-header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .session-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
  }
  .session-date {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .session-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .timer {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }

  .exercise-counter {
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .progress-bar-wrap {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* ── EXERCISE CARD ── */
  .session-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    padding-bottom: 100px;
  }

  .exercise-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 20px 16px;
    margin-bottom: 16px;
  }

  .exercise-name {
    font-size: 22px;
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 10px;
    color: var(--text);
  }

  .exercise-target {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 12px;
  }

  .badge {
    background: var(--bg3);
    color: var(--accent);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 13px;
    font-weight: 600;
  }

  .coach-notes {
    background: rgba(67,97,238,0.1);
    border-left: 3px solid var(--accent);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 10px 12px;
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 12px;
    line-height: 1.5;
  }

  .criteria-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 4px;
  }

  .criterion-tag {
    background: rgba(6,214,160,0.1);
    border: 1px solid rgba(6,214,160,0.3);
    color: var(--success);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 500;
  }

  /* ── SERIES ── */
  .series-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 20px 0 10px;
  }

  .series-header h3 {
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
  }

  .series-list { display: flex; flex-direction: column; gap: 10px; }

  .series-row {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    transition: border-color 0.2s;
  }
  .series-row.active { border-color: var(--accent); }
  .series-row.done { border-color: rgba(6,214,160,0.4); background: rgba(6,214,160,0.04); }

  .series-num {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--bg3);
    color: var(--accent);
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .series-row.done .series-num {
    background: rgba(6,214,160,0.2);
    color: var(--success);
  }

  .series-inputs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .input-group label {
    font-size: 11px;
    margin-bottom: 0;
  }

  input[type="number"] {
    width: 100%;
    background: var(--bg2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 18px;
    font-weight: 700;
    padding: 8px 10px;
    text-align: center;
    outline: none;
    min-height: 44px;
    -webkit-appearance: none;
    -moz-appearance: textfield;
    transition: border-color 0.2s;
  }
  input[type="number"]:focus { border-color: var(--accent); }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

  /* ── NEW SERIES INTERACTION MODEL ── */

  /* State A: CTA button */
  .btn-complete {
    width: 100%;
    min-height: 52px;
    font-size: 16px;
    font-weight: 700;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    margin-top: 12px;
    transition: opacity 0.15s, transform 0.1s, background 0.2s;
    -webkit-appearance: none;
  }
  .btn-complete:hover { background: var(--accent-hover); }
  .btn-complete:active { transform: scale(0.97); opacity: 0.9; }

  /* State B: review panel */
  .series-row.review { border-color: var(--accent); }
  .review-panel { margin-top: 12px; animation: fadeIn 0.2s ease; }

  /* Adjustment grid */
  .adj-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 8px;
  }
  .adj-pill {
    min-height: 48px;
    border-radius: 10px;
    border: 2px solid transparent;
    background: var(--bg2);
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    padding: 8px 10px;
    text-align: center;
    line-height: 1.3;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    -webkit-appearance: none;
  }
  .adj-pill:active { transform: scale(0.97); }
  .adj-pill.selected.correct { background: rgba(6,214,160,0.15); border-color: var(--success); color: var(--success); }
  .adj-pill.selected.up      { background: rgba(67,97,238,0.15); border-color: var(--accent); color: var(--accent); }
  .adj-pill.selected.down    { background: rgba(255,209,102,0.15); border-color: var(--warning); color: var(--warning); }
  .adj-pill.selected.incomplete { background: rgba(239,71,111,0.15); border-color: var(--danger); color: var(--danger); }

  /* Criteria chips */
  .criteria-chips { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .criteria-chip {
    width: 100%;
    min-height: 44px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--bg2);
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    padding: 10px 14px;
    text-align: left;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    -webkit-appearance: none;
  }
  .criteria-chip.checked { background: rgba(6,214,160,0.12); border-color: var(--success); color: var(--text); }
  .criteria-chip:active { transform: scale(0.98); }

  /* Confirm button */
  .btn-confirm-series:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Readonly inputs in review state */
  input[type="number"][readonly] {
    background: var(--bg3);
    color: var(--text-muted);
    border-color: transparent;
    cursor: default;
  }

  /* State C: done compact row */
  .series-done-row { display: flex; align-items: center; gap: 10px; }
  .series-done-info { flex: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .series-done-values { font-size: 14px; font-weight: 600; color: var(--text); }
  .series-done-adj { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }
  .adj-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .adj-dot.correct  { background: var(--success); }
  .adj-dot.up       { background: var(--accent); }
  .adj-dot.down     { background: var(--warning); }
  .adj-dot.incomplete { background: var(--danger); }
  .series-done-criteria { font-size: 12px; color: var(--success); }
  .btn-edit-series {
    background: none; border: none; color: var(--text-muted);
    font-size: 12px; cursor: pointer; padding: 4px;
    flex-shrink: 0; -webkit-appearance: none;
  }
  .btn-edit-series:hover { color: var(--accent); }

  /* Locked state */
  .series-row.locked { opacity: 0.45; }
  .series-locked-text { font-size: 13px; color: var(--text-muted); font-style: italic; }

  /* Shared row top (pending/locked) */
  .series-row-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .series-row-label { font-size: 14px; font-weight: 600; color: var(--text-muted); }

  /* Series note (still used in review panel) */
  .series-note-input {
    width: 100%;
    background: var(--bg2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    margin-top: 8px;
    min-height: 44px;
    font-family: system-ui, sans-serif;
    transition: border-color 0.2s;
    resize: none;
    display: none;
  }
  .series-note-input.open { display: block; }
  .series-note-input:focus { border-color: var(--accent); }

  /* ── SESSION NAV ── */
  .session-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    z-index: 20;
  }

  .session-nav .btn {
    flex: 1;
  }

  .btn-add-exercise {
    flex: 0 0 auto !important;
    width: 48px !important;
    padding: 0 !important;
    font-size: 22px !important;
    background: var(--bg3) !important;
    color: var(--accent) !important;
  }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: flex-end;
    animation: fadeIn 0.2s ease;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 24px 20px 32px;
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .modal h2 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
  }

  .field {
    margin-bottom: 16px;
  }

  input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 16px;
    padding: 12px 14px;
    outline: none;
    min-height: 48px;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  input[type="text"]:focus { border-color: var(--accent); }

  .modal-btns { display: flex; gap: 10px; margin-top: 8px; }

  /* ── SCREEN 3: SUMMARY ── */
  #screen-summary {
    flex-direction: column;
  }

  .summary-header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 16px;
  }

  .summary-header h2 {
    font-size: 20px;
    font-weight: 800;
    color: var(--success);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .summary-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    padding-bottom: 32px;
  }

  .copy-btn-wrap {
    position: relative;
    margin-bottom: 12px;
  }

  .copy-confirm {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--success);
    color: #000;
    font-weight: 700;
    font-size: 15px;
    border-radius: var(--radius-sm);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .copy-confirm.show { opacity: 1; }

  /* ── UTILITIES ── */
  .row { display: flex; gap: 10px; }
  .row .btn { flex: 1; }
  .section-label {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── RECOVERY BANNER ── */
  #recovery-banner {
    width: 100%;
    max-width: 480px;
    margin-bottom: 12px;
    background: var(--warning);
    border-radius: var(--radius);
    padding: 16px 20px;
    color: #1a1a2e;
  }
  .recovery-title {
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 4px;
  }
  .recovery-time {
    font-size: 13px;
    margin-bottom: 12px;
    opacity: 0.75;
  }
  .recovery-btns { display: flex; gap: 10px; }
  .btn-discard {
    background: transparent;
    border: 1.5px solid rgba(26,26,46,0.35);
    border-radius: var(--radius-sm);
    color: #1a1a2e;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    padding: 10px 16px;
    min-height: 44px;
    -webkit-appearance: none;
    transition: background 0.15s;
  }
  .btn-discard:hover { background: rgba(26,26,46,0.1); }

  /* ── AI PROMPT SECTION ── */
  #ai-prompt-section {
    width: 100%;
    max-width: 480px;
    margin-top: 16px;
  }
  #ai-prompt-toggle {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .ai-chevron {
    font-size: 12px;
    transition: transform 0.3s;
    flex-shrink: 0;
    margin-left: 8px;
  }
  #ai-prompt-toggle.open .ai-chevron { transform: rotate(180deg); }
  #ai-prompt-content {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
  }
  #ai-prompt-content.open { max-height: 900px; }
  .ai-prompt-inner { padding-top: 12px; }

  /* finish button highlight */
  .finish-banner {
    background: rgba(6,214,160,0.1);
    border: 1px solid rgba(6,214,160,0.3);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    margin-bottom: 16px;
    font-size: 14px;
    color: var(--success);
    text-align: center;
  }

</style>
</head>
<body>

<!-- ════════════════════════════════ SCREEN 1 ════════════════════════════════ -->
<div id="screen-load" class="screen active">

  <div id="recovery-banner" style="display:none">
    <div class="recovery-title" id="recovery-title"></div>
    <div class="recovery-time" id="recovery-time"></div>
    <div class="recovery-btns">
      <button class="btn btn-primary btn-sm" style="flex:1" onclick="restoreSession()">Continuar sesión →</button>
      <button class="btn-discard" onclick="discardSession()">Descartar</button>
    </div>
  </div>

  <div class="load-card">
    <div class="logo">
      <span class="logo-icon">🏋️</span>
      <h1>Gym Session Tracker</h1>
      <p>Carga tu plan de entrenamiento</p>
    </div>

    <label for="json-input">Pega el JSON del plan</label>
    <textarea id="json-input" placeholder='{"sesion": "...", "fecha": "...", "ejercicios": [...]}'></textarea>

    <div class="divider">o</div>

    <button class="file-btn" onclick="document.getElementById('file-input').click()">
      <span>📂</span> Cargar archivo JSON
    </button>
    <input type="file" id="file-input" accept=".json,application/json">

    <div id="load-error" class="error-box"></div>

    <button class="btn btn-primary mt-20" onclick="loadSession()">
      Cargar sesión →
    </button>
  </div>

  <div id="ai-prompt-section">
    <button class="btn btn-ghost" id="ai-prompt-toggle" onclick="toggleAiPrompt()">
      <span>💡 Generar plan con IA</span>
      <span class="ai-chevron">▼</span>
    </button>
    <div id="ai-prompt-content">
      <div class="ai-prompt-inner">
        <div class="section-label" style="margin-bottom:8px">Copia este prompt en cualquier IA</div>
        <textarea id="ai-prompt-text" readonly style="min-height:280px;font-size:13px;font-family:monospace;background:var(--bg2);cursor:default;resize:vertical">Eres un entrenador personal especializado en fuerza funcional y prevención de lesiones.
Necesito que generes un plan de entrenamiento en formato JSON para cargar en mi app.
Mi perfil:

Hombre, 48 años, 1,74m, ~83kg
Objetivo: pérdida de grasa y fuerza funcional
Historial: dolor lumbar recurrente (sin episodio activo)
Disponibilidad: 1 sesión/semana en gimnasio con máquinas
Duración: ~1 hora

Genera el JSON con esta estructura EXACTA (sin texto adicional, solo el JSON):
{
"sesion": "Nombre descriptivo",
"fecha": "YYYY-MM-DD",
"ejercicios": [
{
"nombre": "Nombre del ejercicio",
"series": 3,
"repeticiones": 12,
"peso_orientativo_kg": 40,
"notas": "Clave técnica principal",
"criterios_valoracion": [
"Criterio observable 1",
"Criterio observable 2"
]
}
]
}
Incluye 6-8 ejercicios ordenados por bloque (calentamiento, bloque principal,
vuelta a la calma). Para ejercicios de movilidad omite repeticiones y peso.
Los criterios_valoracion deben ser sensaciones internas, no métricas externas.</textarea>
        <div class="copy-btn-wrap mt-12">
          <button class="btn btn-secondary btn-sm" onclick="copyAiPrompt()">Copiar prompt</button>
          <div class="copy-confirm" id="ai-copy-confirm">¡Copiado! ✓</div>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- ════════════════════════════════ SCREEN 2 ════════════════════════════════ -->
<div id="screen-session" class="screen">
  <div class="session-header">
    <div class="session-header-top">
      <div>
        <div class="session-title" id="hdr-name"></div>
        <div class="session-date" id="hdr-date"></div>
      </div>
      <div class="session-meta">
        <span class="timer" id="timer-display">00:00</span>
        <span class="exercise-counter" id="exercise-counter"></span>
      </div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
    </div>
  </div>

  <div class="session-body" id="session-body"></div>

  <div class="session-nav">
    <button class="btn btn-secondary btn-sm" id="btn-prev" onclick="navigate(-1)">← Anterior</button>
    <button class="btn btn-primary btn-sm" id="btn-next" onclick="navigate(1)">Siguiente →</button>
    <button class="btn btn-add-exercise btn-sm" title="Añadir ejercicio" onclick="openAddModal()">＋</button>
  </div>
</div>

<!-- ════════════════════════════════ SCREEN 3 ════════════════════════════════ -->
<div id="screen-summary" class="screen">
  <div class="summary-header">
    <h2>✅ Sesión completada</h2>
  </div>
  <div class="summary-body">
    <div class="finish-banner" id="finish-banner"></div>
    <div class="copy-btn-wrap">
      <button class="btn btn-success" onclick="copyMarkdown()">📋 Copiar al portapapeles</button>
      <div class="copy-confirm" id="copy-confirm">¡Copiado! ✓</div>
    </div>
    <div class="section-label">Resumen de la sesión</div>
    <textarea class="readonly" id="summary-output" readonly></textarea>
    <button class="btn btn-ghost mt-12" onclick="backToSession()">← Volver a editar</button>
  </div>
</div>

<!-- ════════════════════════════════ MODAL ════════════════════════════════ -->
<div id="modal-add" class="modal-overlay" onclick="handleModalOverlay(event)">
  <div class="modal">
    <h2>➕ Añadir ejercicio</h2>
    <div class="field">
      <label for="modal-name">Nombre del ejercicio</label>
      <input type="text" id="modal-name" placeholder="Ej: Curl de bíceps">
    </div>
    <div class="field">
      <label for="modal-series">Número de series</label>
      <input type="number" id="modal-series" value="3" min="1" max="20">
    </div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeAddModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmAddExercise()">Añadir</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
const state = {
  session: null,       // parsed JSON
  exercises: [],       // array of exercise objects with per-series log
  currentIndex: 0,
  timerStart: null,
  timerInterval: null,
  completedAt: null,
};

/* ═══════════════════════════════════════════════════
   STORAGE
═══════════════════════════════════════════════════ */
const STORAGE_KEY = 'gym_session_state';

function saveToStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      session: state.session,
      exercises: state.exercises,
      currentIndex: state.currentIndex,
      timerStart: state.timerStart,
      savedAt: Date.now(),
    }));
  } catch(e) {}
}

function clearStorage() {
  localStorage.removeItem(STORAGE_KEY);
}

/* ═══════════════════════════════════════════════════
   SCREEN 1 — LOAD
═══════════════════════════════════════════════════ */
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('json-input').value = ev.target.result;
  };
  reader.readAsText(file);
  e.target.value = '';
});

function loadSession() {
  const raw = document.getElementById('json-input').value.trim();
  const errEl = document.getElementById('load-error');

  if (!raw) {
    showError(errEl, 'Por favor pega un JSON o carga un archivo.');
    return;
  }

  let parsed;
  try {
    parsed = JSON.parse(raw);
  } catch(e) {
    showError(errEl, `JSON inválido: ${e.message}`);
    return;
  }

  if (!parsed.ejercicios || !Array.isArray(parsed.ejercicios) || parsed.ejercicios.length === 0) {
    showError(errEl, 'El JSON debe tener un array "ejercicios" con al menos un ejercicio.');
    return;
  }

  for (let i = 0; i < parsed.ejercicios.length; i++) {
    const ej = parsed.ejercicios[i];
    if (!ej.nombre || typeof ej.nombre !== 'string') {
      showError(errEl, `Ejercicio ${i+1}: el campo "nombre" es obligatorio.`);
      return;
    }
    if (!ej.series || typeof ej.series !== 'number' || ej.series < 1) {
      showError(errEl, `Ejercicio "${ej.nombre}": el campo "series" debe ser un número mayor que 0.`);
      return;
    }
  }

  errEl.classList.remove('visible');
  clearStorage();
  seriesInReview = null;
  document.getElementById('recovery-banner').style.display = 'none';
  clearInterval(state.timerInterval);

  state.session = parsed;
  state.exercises = parsed.ejercicios.map(buildExercise);
  state.currentIndex = 0;
  state.completedAt = null;

  initSessionScreen();
  showScreen('screen-session');

  // start timer
  state.timerStart = Date.now();
  state.timerInterval = setInterval(updateTimer, 1000);
}

function showError(el, msg) {
  el.textContent = msg;
  el.classList.add('visible');
}

/* ═══════════════════════════════════════════════════
   EXERCISE MODEL
═══════════════════════════════════════════════════ */
function buildExercise(raw) {
  const seriesCount = raw.series;
  const criterios = raw.criterios_valoracion ?? [];
  const series = [];
  for (let i = 0; i < seriesCount; i++) {
    series.push({
      reps: raw.repeticiones != null ? raw.repeticiones : null,
      weight: raw.peso_orientativo_kg != null ? raw.peso_orientativo_kg : null,
      rating: null,        // 'ok'|'adjust'|'fail' — derived from adjustment for markdown compat
      adjustment: null,    // 'correct'|'up'|'down'|'incomplete'
      criteriaChecked: criterios.map(() => false),
      note: '',
    });
  }
  return {
    nombre: raw.nombre,
    series: seriesCount,
    repeticiones: raw.repeticiones ?? null,
    peso: raw.peso_orientativo_kg ?? null,
    notas: raw.notas ?? null,
    criterios: criterios,
    log: series,
    isAdded: false,
  };
}

/* ═══════════════════════════════════════════════════
   SCREEN 2 — SESSION
═══════════════════════════════════════════════════ */
let seriesInReview = null; // { exIdx, sIdx } — ephemeral, not persisted

function initSessionScreen() {
  const s = state.session;
  document.getElementById('hdr-name').textContent = s.sesion || 'Sesión';
  document.getElementById('hdr-date').textContent = s.fecha
    ? formatDate(s.fecha)
    : new Date().toLocaleDateString('es-ES', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  renderExercise();
}

function renderExercise() {
  const idx = state.currentIndex;
  const exs = state.exercises;
  const ex = exs[idx];

  // header meta
  document.getElementById('exercise-counter').textContent = `${idx + 1} / ${exs.length}`;

  // progress = exercises where all series are rated
  const completed = exs.filter(e => isExerciseDone(e)).length;
  const pct = Math.round((completed / exs.length) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';

  // nav buttons
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').textContent =
    idx === exs.length - 1 ? 'Finalizar ✓' : 'Siguiente →';
  document.getElementById('btn-next').className =
    idx === exs.length - 1 ? 'btn btn-success btn-sm' : 'btn btn-primary btn-sm';

  // build card HTML
  let html = '';

  // exercise card
  html += `<div class="exercise-card">`;
  html += `<div class="exercise-name">${escHtml(ex.nombre)}</div>`;

  // badges
  html += `<div class="exercise-target">`;
  if (ex.repeticiones != null || ex.peso != null) {
    let target = `${ex.series} series`;
    if (ex.repeticiones != null) target += ` × ${ex.repeticiones} reps`;
    if (ex.peso != null) target += ` @ ${ex.peso} kg`;
    html += `<span class="badge">🎯 ${escHtml(target)}</span>`;
  } else {
    html += `<span class="badge">🎯 ${ex.series} series</span>`;
  }
  if (ex.isAdded) html += `<span class="badge" style="color:var(--warning)">➕ Añadido</span>`;
  html += `</div>`;

  // coach notes
  if (ex.notas) {
    html += `<div class="coach-notes">💬 ${escHtml(ex.notas)}</div>`;
  }

  // criteria
  if (ex.criterios && ex.criterios.length > 0) {
    html += `<div class="section-label" style="margin-top:4px">Criterios de valoración</div>`;
    html += `<div class="criteria-list">`;
    ex.criterios.forEach(c => {
      html += `<span class="criterion-tag">${escHtml(c)}</span>`;
    });
    html += `</div>`;
  }

  html += `</div>`; // end exercise-card

  // series section
  html += `<div class="series-header"><h3>Series</h3></div>`;
  html += `<div class="series-list">`;

  ex.log.forEach((s, si) => {
    const isDone = s.adjustment !== null;
    const isInRev = seriesInReview && seriesInReview.exIdx === idx && seriesInReview.sIdx === si;
    const prevAllDone = ex.log.slice(0, si).every(prev => prev.adjustment !== null);

    if (isInRev) {
      html += buildSeriesReview(idx, si, s, ex);
    } else if (isDone) {
      html += buildSeriesDone(idx, si, s, ex);
    } else if (prevAllDone) {
      html += buildSeriesPending(idx, si, s, ex);
    } else {
      html += buildSeriesLocked(idx, si);
    }
  });

  html += `</div>`; // end series-list

  document.getElementById('session-body').innerHTML = html;
  document.getElementById('session-body').scrollTo(0, 0);
}

/* ── Series row builders ── */

function buildSeriesPending(exIdx, sIdx, s, ex) {
  const rv = s.reps != null ? s.reps : '';
  const rp = ex.repeticiones != null ? ex.repeticiones : '—';
  const wv = s.weight != null ? s.weight : '';
  const wp = ex.peso != null ? ex.peso : '—';
  return `<div class="series-row active" id="series-row-${exIdx}-${sIdx}">
    <div class="series-row-top">
      <div class="series-num">${sIdx + 1}</div>
      <span class="series-row-label">Serie ${sIdx + 1}</span>
    </div>
    <div class="series-inputs">
      <div class="input-group">
        <label>Repeticiones</label>
        <input type="number" id="reps-${exIdx}-${sIdx}" min="0" max="999"
          value="${rv}" placeholder="${rp}"
          oninput="updateSeriesField(${exIdx},${sIdx},'reps',this.value)"
          inputmode="numeric">
      </div>
      <div class="input-group">
        <label>Peso (kg)</label>
        <input type="number" id="weight-${exIdx}-${sIdx}" min="0" max="9999" step="0.5"
          value="${wv}" placeholder="${wp}"
          oninput="updateSeriesField(${exIdx},${sIdx},'weight',this.value)"
          inputmode="decimal">
      </div>
    </div>
    <button class="btn-complete" onclick="openReview(${exIdx},${sIdx})">Completar serie →</button>
  </div>`;
}

function buildSeriesReview(exIdx, sIdx, s, ex) {
  const rv = s.reps != null ? s.reps : '';
  const rp = ex.repeticiones != null ? ex.repeticiones : '—';
  const wv = s.weight != null ? s.weight : '';
  const wp = ex.peso != null ? ex.peso : '—';

  const adjDefs = [
    { key: 'correct',    label: '✓ Peso correcto' },
    { key: 'up',         label: '↑ Subir peso' },
    { key: 'down',       label: '↓ Bajar peso' },
    { key: 'incomplete', label: '✗ Serie incompleta' },
  ];
  const pillsHtml = adjDefs.map(a =>
    `<button class="adj-pill${s.adjustment === a.key ? ' selected ' + a.key : ''}" data-adj="${a.key}"
      onclick="selectAdjustment(${exIdx},${sIdx},'${a.key}')">${a.label}</button>`
  ).join('');

  let criteriaHtml = '';
  if (ex.criterios && ex.criterios.length > 0) {
    const chips = ex.criterios.map((c, ci) => {
      const checked = Array.isArray(s.criteriaChecked) && s.criteriaChecked[ci];
      return `<button class="criteria-chip${checked ? ' checked' : ''}"
        id="criterion-${exIdx}-${sIdx}-${ci}"
        onclick="toggleCriterion(${exIdx},${sIdx},${ci})">${checked ? '✓ ' : ''}${escHtml(c)}</button>`;
    }).join('');
    criteriaHtml = `<div class="section-label" style="margin-top:12px">Criterios cumplidos</div>
      <div class="criteria-chips">${chips}</div>`;
  }

  return `<div class="series-row review" id="series-row-${exIdx}-${sIdx}">
    <div class="series-row-top">
      <div class="series-num">${sIdx + 1}</div>
      <span class="series-row-label">Serie ${sIdx + 1}</span>
    </div>
    <div class="series-inputs">
      <div class="input-group">
        <label>Repeticiones</label>
        <input type="number" readonly value="${rv}" placeholder="${rp}" inputmode="numeric">
      </div>
      <div class="input-group">
        <label>Peso (kg)</label>
        <input type="number" readonly value="${wv}" placeholder="${wp}" inputmode="decimal">
      </div>
    </div>
    <div class="review-panel">
      <div class="section-label">¿Cómo fue el peso?</div>
      <div class="adj-grid">${pillsHtml}</div>
      ${criteriaHtml}
      <div class="section-label" style="margin-top:12px">Nota (opcional)</div>
      <textarea class="series-note-input open"
        placeholder="Nota opcional..."
        oninput="updateSeriesField(${exIdx},${sIdx},'note',this.value)"
        rows="2">${escHtml(s.note)}</textarea>
      <button class="btn btn-success btn-confirm-series" style="margin-top:12px;min-height:48px"
        ${s.adjustment === null ? 'disabled' : ''}
        onclick="confirmSeries(${exIdx},${sIdx})">Confirmar serie ✓</button>
    </div>
  </div>`;
}

function buildSeriesDone(exIdx, sIdx, s, ex) {
  const repsD = s.reps != null ? s.reps : (ex.repeticiones != null ? ex.repeticiones : '—');
  const weightD = s.weight != null ? s.weight : (ex.peso != null ? ex.peso : '—');
  const adjLabels = { correct: 'Peso correcto', up: 'Subir peso', down: 'Bajar peso', incomplete: 'Serie incompleta' };
  const adjLabel = s.adjustment ? adjLabels[s.adjustment] : '';
  let criteriaHtml = '';
  if (ex.criterios && ex.criterios.length > 0) {
    const n = (s.criteriaChecked || []).filter(Boolean).length;
    criteriaHtml = `<span class="series-done-criteria">✓ ${n}/${ex.criterios.length} criterios</span>`;
  }
  return `<div class="series-row done" id="series-row-${exIdx}-${sIdx}">
    <div class="series-done-row">
      <div class="series-num">${sIdx + 1}</div>
      <div class="series-done-info">
        <span class="series-done-values">${repsD} rep · ${weightD} kg</span>
        <span class="series-done-adj">
          <span class="adj-dot ${s.adjustment || ''}"></span>${escHtml(adjLabel)}
        </span>
        ${criteriaHtml}
      </div>
      <button class="btn-edit-series" onclick="editSeries(${exIdx},${sIdx})">editar</button>
    </div>
  </div>`;
}

function buildSeriesLocked(exIdx, sIdx) {
  return `<div class="series-row locked" id="series-row-${exIdx}-${sIdx}">
    <div class="series-row-top">
      <div class="series-num">${sIdx + 1}</div>
      <span class="series-locked-text">bloqueada</span>
    </div>
  </div>`;
}

/* ── Series interaction handlers ── */

function openReview(exIdx, sIdx) {
  const repsEl = document.getElementById(`reps-${exIdx}-${sIdx}`);
  const weightEl = document.getElementById(`weight-${exIdx}-${sIdx}`);
  if (repsEl) {
    const v = repsEl.value;
    state.exercises[exIdx].log[sIdx].reps = v === '' ? null : parseFloat(v);
  }
  if (weightEl) {
    const v = weightEl.value;
    state.exercises[exIdx].log[sIdx].weight = v === '' ? null : parseFloat(v);
  }
  seriesInReview = { exIdx, sIdx };
  renderExercise();
}

function selectAdjustment(exIdx, sIdx, adj) {
  state.exercises[exIdx].log[sIdx].adjustment = adj;
  const row = document.getElementById(`series-row-${exIdx}-${sIdx}`);
  if (row) {
    row.querySelectorAll('.adj-pill').forEach(p => {
      const key = p.dataset.adj;
      p.className = 'adj-pill' + (key === adj ? ' selected ' + key : '');
    });
    const btn = row.querySelector('.btn-confirm-series');
    if (btn) btn.disabled = false;
  }
}

function toggleCriterion(exIdx, sIdx, ci) {
  const s = state.exercises[exIdx].log[sIdx];
  if (!Array.isArray(s.criteriaChecked)) s.criteriaChecked = [];
  s.criteriaChecked[ci] = !s.criteriaChecked[ci];
  const chip = document.getElementById(`criterion-${exIdx}-${sIdx}-${ci}`);
  if (chip) {
    chip.classList.toggle('checked', s.criteriaChecked[ci]);
    chip.innerHTML = (s.criteriaChecked[ci] ? '✓ ' : '') + escHtml(state.exercises[exIdx].criterios[ci]);
  }
}

function confirmSeries(exIdx, sIdx) {
  const s = state.exercises[exIdx].log[sIdx];
  if (!s.adjustment) return;
  const ratingMap = { correct: 'ok', up: 'ok', down: 'adjust', incomplete: 'fail' };
  s.rating = ratingMap[s.adjustment];
  seriesInReview = null;
  renderExercise();
  saveToStorage();
}

function editSeries(exIdx, sIdx) {
  seriesInReview = { exIdx, sIdx };
  renderExercise();
}

function updateSeriesField(exIdx, sIdx, field, value) {
  const s = state.exercises[exIdx].log[sIdx];
  if (field === 'reps' || field === 'weight') {
    s[field] = value === '' ? null : parseFloat(value);
  } else {
    s[field] = value;
  }
  saveToStorage();
}

function isExerciseDone(ex) {
  return ex.log.every(s => s.adjustment !== null);
}

function navigate(dir) {
  const newIdx = state.currentIndex + dir;

  if (dir === 1 && newIdx >= state.exercises.length) {
    // try to finish
    const allDone = state.exercises.every(isExerciseDone);
    if (!allDone) {
      // find first incomplete exercise
      const firstIncomplete = state.exercises.findIndex(e => !isExerciseDone(e));
      if (firstIncomplete !== -1) {
        seriesInReview = null;
        state.currentIndex = firstIncomplete;
        renderExercise();
        saveToStorage();
      }
      return;
    }
    finishSession();
    return;
  }

  if (newIdx < 0 || newIdx >= state.exercises.length) return;
  seriesInReview = null;
  state.currentIndex = newIdx;
  renderExercise();
  saveToStorage();
}

/* ═══════════════════════════════════════════════════
   ADD EXERCISE MODAL
═══════════════════════════════════════════════════ */
function openAddModal() {
  document.getElementById('modal-name').value = '';
  document.getElementById('modal-series').value = '3';
  document.getElementById('modal-add').classList.add('open');
  setTimeout(() => document.getElementById('modal-name').focus(), 100);
}

function closeAddModal() {
  document.getElementById('modal-add').classList.remove('open');
}

function handleModalOverlay(e) {
  if (e.target === document.getElementById('modal-add')) closeAddModal();
}

function confirmAddExercise() {
  const name = document.getElementById('modal-name').value.trim();
  const seriesCount = parseInt(document.getElementById('modal-series').value, 10);

  if (!name) {
    document.getElementById('modal-name').focus();
    return;
  }
  if (!seriesCount || seriesCount < 1) {
    document.getElementById('modal-series').focus();
    return;
  }

  const ex = buildExercise({ nombre: name, series: seriesCount });
  ex.isAdded = true;
  state.exercises.push(ex);
  seriesInReview = null;
  state.currentIndex = state.exercises.length - 1;
  closeAddModal();
  renderExercise();
  saveToStorage();
}

/* ═══════════════════════════════════════════════════
   TIMER
═══════════════════════════════════════════════════ */
function updateTimer() {
  const elapsed = Math.floor((Date.now() - state.timerStart) / 1000);
  const m = Math.floor(elapsed / 60).toString().padStart(2, '0');
  const s = (elapsed % 60).toString().padStart(2, '0');
  document.getElementById('timer-display').textContent = `${m}:${s}`;
}

function getElapsedMinutes() {
  return Math.round((Date.now() - state.timerStart) / 60000);
}

function getCompletionTime() {
  const d = state.completedAt || new Date();
  return d.toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' });
}

/* ═══════════════════════════════════════════════════
   SCREEN 3 — SUMMARY
═══════════════════════════════════════════════════ */
function finishSession() {
  state.completedAt = new Date();
  clearInterval(state.timerInterval);
  clearStorage();

  const md = generateMarkdown();
  document.getElementById('summary-output').value = md;

  const mins = getElapsedMinutes();
  document.getElementById('finish-banner').textContent =
    `Sesión completada a las ${getCompletionTime()} — Duración: ${mins} min`;

  showScreen('screen-summary');
}

function backToSession() {
  showScreen('screen-session');
  state.timerInterval = setInterval(updateTimer, 1000);
  renderExercise();
}

function copyMarkdown() {
  const text = document.getElementById('summary-output').value;
  const confirm = document.getElementById('copy-confirm');

  const show = () => {
    confirm.classList.add('show');
    setTimeout(() => confirm.classList.remove('show'), 2000);
  };

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(show).catch(() => fallbackCopy(text, show));
  } else {
    fallbackCopy(text, show);
  }
}

function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); cb(); } catch(e) {}
  document.body.removeChild(ta);
}

/* ═══════════════════════════════════════════════════
   MARKDOWN GENERATION
═══════════════════════════════════════════════════ */
function generateMarkdown() {
  const s = state.session;
  const sessionName = s.sesion || 'Sesión';
  const fecha = s.fecha || new Date().toISOString().slice(0,10);
  const time = getCompletionTime();
  const mins = getElapsedMinutes();

  let md = `---\n## Sesión: ${sessionName} — ${fecha}\n\n`;

  state.exercises.forEach(ex => {
    md += `### ${ex.nombre}\n`;

    const parts = [];
    if (ex.repeticiones != null && ex.peso != null) {
      parts.push(`**Objetivo:** ${ex.series}×${ex.repeticiones} @ ${ex.peso}kg`);
    } else if (ex.repeticiones != null) {
      parts.push(`**Objetivo:** ${ex.series}×${ex.repeticiones}`);
    } else {
      parts.push(`**Objetivo:** ${ex.series} series`);
    }
    md += `- ${parts[0]}\n`;

    if (ex.notas) {
      md += `- **Notas del plan:** ${ex.notas}\n`;
    }
    md += '\n';

    // table
    md += `| Serie | Reps | Peso (kg) | Ajuste | Criterios | Nota |\n`;
    md += `|-------|------|-----------|--------|-----------|------|\n`;

    ex.log.forEach((s, i) => {
      const adjLabels = { correct: 'Peso correcto', up: 'Subir peso', down: 'Bajar peso', incomplete: 'Serie incompleta' };
      const ajuste = s.adjustment ? adjLabels[s.adjustment] : '—';
      const reps = s.reps != null ? s.reps : (ex.repeticiones != null ? ex.repeticiones : '—');
      const weight = s.weight != null ? s.weight : (ex.peso != null ? ex.peso : '—');
      const note = s.note || '';
      let criteriosCol = '—';
      if (ex.criterios && ex.criterios.length > 0) {
        const n = (s.criteriaChecked || []).filter(Boolean).length;
        criteriosCol = `✓ ${n}/${ex.criterios.length}`;
      }
      md += `| ${i+1} | ${reps} | ${weight} | ${ajuste} | ${criteriosCol} | ${note} |\n`;
    });

    md += '\n---\n';
  });

  md += `\n*Sesión completada a las ${time} — Duración: ${mins} min*\n---\n`;
  return md;
}

/* ═══════════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function formatDate(dateStr) {
  try {
    const d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString('es-ES', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  } catch(e) {
    return dateStr;
  }
}

function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ═══════════════════════════════════════════════════
   SESSION RECOVERY
═══════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return;
  try {
    const saved = JSON.parse(raw);
    if (saved && saved.session) {
      document.getElementById('recovery-title').textContent =
        '📂 ' + (saved.session.sesion || 'Sesión guardada');
      const savedAt = new Date(saved.savedAt);
      const timeStr = savedAt.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('recovery-time').textContent = `Guardada a las ${timeStr}`;
      document.getElementById('recovery-banner').style.display = 'block';
    }
  } catch(e) {
    localStorage.removeItem(STORAGE_KEY);
  }
});

function restoreSession() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return;
  const saved = JSON.parse(raw);
  state.session = saved.session;
  state.exercises = saved.exercises;
  state.currentIndex = saved.currentIndex;
  state.timerStart = parseInt(saved.timerStart, 10);
  state.completedAt = null;

  // Migrate log entries from older storage format lacking new fields
  state.exercises.forEach(ex => {
    const criteriosLen = (ex.criterios || []).length;
    ex.log.forEach(s => {
      if (s.adjustment === undefined) s.adjustment = null;
      if (!Array.isArray(s.criteriaChecked)) s.criteriaChecked = Array(criteriosLen).fill(false);
    });
  });

  seriesInReview = null;
  clearInterval(state.timerInterval);
  document.getElementById('recovery-banner').style.display = 'none';
  initSessionScreen();
  showScreen('screen-session');
  state.timerInterval = setInterval(updateTimer, 1000);
}

function discardSession() {
  clearStorage();
  document.getElementById('recovery-banner').style.display = 'none';
}

  const toggle = document.getElementById('ai-prompt-toggle');

  const isOpen = content.classList.contains('open');
  content.classList.toggle('open', !isOpen);
  toggle.classList.toggle('open', !isOpen);
}

function copyAiPrompt() {
  const text = document.getElementById('ai-prompt-text').value;
  const confirm = document.getElementById('ai-copy-confirm');
  const show = () => {
    confirm.classList.add('show');
    setTimeout(() => confirm.classList.remove('show'), 2000);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(show).catch(() => fallbackCopy(text, show));
  } else {
    fallbackCopy(text, show);
  }
}
